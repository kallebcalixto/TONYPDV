<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <title>Tony PDV | Admin</title>
</head>
<body>
    <script>
        if(sessionStorage.getItem("logado") !== "true") window.location.href = "login.html";
    </script>

    <div class="admin-layout">
        <nav class="sidebar">
            <h2>TONY<span>PDV</span></h2>
            <div class="fin-card">
                <small>Vendas Totais</small>
                <h3 id="total-vendas">R$ 0.00</h3>
            </div>
            <div class="fin-card">
                <small>Lucro Líquido</small>
                <h3 id="total-lucro">R$ 0.00</h3>
            </div>
            <button onclick="sessionStorage.clear(); window.location.href='index.html';" style="width:100%; padding:10px; cursor:pointer; margin-top:20px;">Sair</button>
        </nav>

        <main class="main-admin">
            <h1>Gestão Profissional</h1>
            <div class="admin-grid">
                <section class="glass-card">
                    <h3>📦 Novo Produto</h3>
                    <input type="text" id="nomeProd" placeholder="Nome">
                    <input type="number" id="precoProd" placeholder="Preço">
                    <input type="number" id="estoqueProd" placeholder="Estoque">
                    <input type="text" id="fotoProd" placeholder="Link da Foto">
                    <button onclick="salvarProduto()">Salvar Produto</button>
                </section>

                <section class="glass-card">
                    <h3>💸 Lançar Insumo</h3>
                    <input type="text" id="nomeInsumo" placeholder="Ex: Carne, Luz">
                    <input type="number" id="valorInsumo" placeholder="Valor R$">
                    <button onclick="salvarInsumo()">Registrar Gasto</button>
                </section>

                <section class="glass-card" style="grid-column: span 2">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                        <h3>🛠 Estoque e Senha do Caixa</h3>
                        <div style="display:flex; gap:10px">
                            <input type="text" id="senhaCaixa" placeholder="Nova Senha Caixa" style="margin:0; width:150px">
                            <button onclick="atualizarSenhaCaixa()" style="background:#22c55e; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer">Atualizar Senha</button>
                        </div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Preço</th>
                                <th>Estoque</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="lista-corpo"></tbody>
                    </table>
                </section>
            </div>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
