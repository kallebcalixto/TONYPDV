<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acesso PDV | Tony Bertoldi</title>
    <style>
        body { background: #0f172a; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; margin: 0; }
        .login-card { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 300px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h2 { color: white; margin-bottom: 5px; }
        p { color: #94a3b8; font-size: 13px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: none; outline: none; box-sizing: border-box; background: #1e293b; color: white; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Tony PDV</h2>
        <p>Área Restrita - Digite a Senha</p>
        <input type="password" id="senhaVendedor" placeholder="Senha de Acesso" autofocus>
        <button onclick="acessarVendedor()">Entrar no Sistema</button>
    </div>

    <script>
        function acessarVendedor() {
            const senha = document.getElementById('senhaVendedor').value;
            // Senha atualizada para: loginvitoria
            if(senha === "loginvitoria") {
                sessionStorage.setItem("acesso_vendedor", "true");
                window.location.href = "index.html";
            } else {
                alert("Acesso Negado!");
                document.getElementById('senhaVendedor').value = "";
            }
        }
        document.getElementById('senhaVendedor').addEventListener('keypress', (e) => { if (e.key === 'Enter') acessarVendedor(); });
    </script>
</body>
</html>
